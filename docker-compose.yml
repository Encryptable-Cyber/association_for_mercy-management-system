services:
  # ─── PostgreSQL Database ─────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mercy_db
    environment:
      POSTGRES_DB: mercy_db
      POSTGRES_USER: mercy_user
      POSTGRES_PASSWORD: mercy_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercy_user -d mercy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache & Sessions ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mercy_redis
    command: redis-server --requirepass mercy_redis_password_change_me
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mercy_redis_password_change_me", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Application ────────────────────────────────
  web:
    build: .
    container_name: mercy_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  redis_data: